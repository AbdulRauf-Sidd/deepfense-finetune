exp_name: CodecFake_wav2vec2_Nes2Net_NoAug_seed42
output_dir: ./outputs/batch_CodecFake/
seed: 42
data:
  sampling_rate: 16000
  label_map:
    bonafide: 1
    spoof: 0
  train:
    dataset_type: StandardDataset
    parquet_files:
    - /netscratch/yelkheir/DeepFense/DeepFense/deepfense/config/parquets/CodecFake/codecfake_train.parquet
    dataset_names:
    - CodecFake_Train
    batch_size: 32
    shuffle: true
    num_workers: 4
    base_transform:
    - type: pad
      max_len: 64000
      random_pad: true
      pad_type: repeat
    augment_transform: []
  val:
    dataset_type: StandardDataset
    parquet_files:
    - /netscratch/yelkheir/DeepFense/DeepFense/deepfense/config/parquets/CodecFake/codecfake_dev.parquet
    dataset_names:
    - CodecFake_Val
    batch_size: 1
    shuffle: false
    num_workers: 4
    base_transform:
    - type: pad
      max_len: 64000
      pad_type: repeat
  test:
    dataset_type: StandardDataset
    parquet_files:
    - /netscratch/yelkheir/DeepFense/DeepFense/deepfense/config/parquets/CodecFake/codecfake_eval.parquet
    dataset_names:
    - CodecFake_Eval
    batch_size: 1
    shuffle: false
    num_workers: 4
    base_transform:
    - type: pad
      max_len: 64000
      pad_type: repeat
model:
  type: StandardDetector
  frontend:
    type: wav2vec2
    args:
      ckpt_path: /netscratch/yelkheir/ssl_models/xlsr2_300m.pt
      freeze: false
      source: fairseq
  backend:
    type: Nes2Net
  loss:
  - type: CrossEntropy
    embedding_dim: 1024
    n_classes: 2
    weight: 1.0
training:
  trainer: StandardTrainer
  epochs: 100
  early_stopping_patience: 7
  optimizer:
    type: adam
    lr: 1.0e-06
  metrics:
    ACC: {}
    EER: {}
  eval_every_epochs: 1
  device: cuda
  output_dir: ./outputs/batch_CodecFake/CodecFake_wav2vec2_Nes2Net_NoAug_seed42_20260205_103035
